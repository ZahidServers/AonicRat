site_name: AonicRAT Documentation
site_description: Educational Remote Administration Tool — Learn how enterprise RATs & RSATs work
site_author: Mohammed Zahid Imtiyaz Wadiwale
site_url: https://aonicrat.readthedocs.io

repo_name: AonicRAT
repo_url: https://github.com/zahidwadiwale/AonicRat

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zahidwadiwale/AonicRat
    - icon: fontawesome/brands/youtube
      link: https://youtu.be/z3ta1hQJclw

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Dependencies: dependencies.md
  - Features:
      - File System: features/file-system.md
      - Command Line: features/command-line.md
      - GUI Remote: features/gui-remote.md
      - Network Controls: features/network-controls.md
      - Client Generator: features/client-generator.md
      - Others:
          - System Info: features/system-info.md
          - Process Manager: features/process-manager.md
          - Clipboard: features/clipboard.md
          - Keylogger: features/keylogger.md
      - Advanced:
          - Power Controls: features/power-controls.md
          - Startup Manager: features/startup-manager.md
          - Message Box: features/message-box.md
      - Settings: features/settings.md
  - Legal & License: legal.md
